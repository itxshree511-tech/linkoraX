{% extends 'base.html' %}

{% block content %}
<div class="flex min-h-screen bg-gray-50">
    <!-- Sidebar -->
    <aside class="w-64 bg-white shadow-lg hidden md:block">
        <div class="p-6">
            <h2 class="text-xl font-bold text-primary-600 mb-6">Dashboard</h2>
            <nav class="space-y-2">
                <a href="/dashboard/" class="flex items-center space-x-3 px-4 py-3 rounded-lg {% if request.path == '/dashboard/' %}bg-primary-50 text-primary-600{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path>
                    </svg>
                    <span>Overview</span>
                </a>
                <a href="/wallet/" class="flex items-center space-x-3 px-4 py-3 rounded-lg {% if '/wallet' in request.path %}bg-primary-50 text-primary-600{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
                    </svg>
                    <span>Wallet</span>
                </a>
                <a href="/referrals/" class="flex items-center space-x-3 px-4 py-3 rounded-lg {% if '/referrals' in request.path %}bg-primary-50 text-primary-600{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path>
                    </svg>
                    <span>Referrals</span>
                </a>
                <a href="/withdrawals/" class="flex items-center space-x-3 px-4 py-3 rounded-lg {% if '/withdrawals' in request.path %}bg-primary-50 text-primary-600{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span>Withdraw</span>
                </a>
                <a href="/payments/" class="flex items-center space-x-3 px-4 py-3 rounded-lg {% if '/payments' in request.path %}bg-primary-50 text-primary-600{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    <span>Payments</span>
                </a>
                <a href="/levels/" class="flex items-center space-x-3 px-4 py-3 rounded-lg {% if '/levels' in request.path %}bg-primary-50 text-primary-600{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                    </svg>
                    <span>Levels</span>
                </a>
                <a href="/resources/" class="flex items-center space-x-3 px-4 py-3 rounded-lg {% if '/resources' in request.path %}bg-primary-50 text-primary-600{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                    </svg>
                    <span>Resources</span>
                </a>
                <a href="/support/" class="flex items-center space-x-3 px-4 py-3 rounded-lg {% if '/support' in request.path %}bg-primary-50 text-primary-600{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"></path>
                    </svg>
                    <span>Support</span>
                </a>
                <a href="/notifications/" class="flex items-center space-x-3 px-4 py-3 rounded-lg {% if '/notifications' in request.path %}bg-primary-50 text-primary-600{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"></path>
                    </svg>
                    <span>Notifications</span>
                </a>
                <a href="/profile/" class="flex items-center space-x-3 px-4 py-3 rounded-lg {% if '/profile' in request.path %}bg-primary-50 text-primary-600{% else %}text-gray-700 hover:bg-gray-100{% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                    </svg>
                    <span>Profile</span>
                </a>
            </nav>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 p-6 pb-[calc(5rem+env(safe-area-inset-bottom))] md:pb-6">
        {% block dashboard_content %}{% endblock %}
    </div>
</div>

<!-- Mobile Bottom Navigation -->
<nav class="md:hidden fixed left-0 right-0 bottom-0 z-[60] bg-white/98 backdrop-blur border-t border-gray-200 shadow-[0_-8px_24px_rgba(0,0,0,0.08)] pb-[env(safe-area-inset-bottom)]">
    <div class="grid grid-cols-5 h-16">
        <a href="/dashboard/" class="flex flex-col items-center justify-center text-[11px] {% if request.path == '/dashboard/' %}text-primary-600{% else %}text-gray-500{% endif %}">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3"></path>
            </svg>
            <span>Home</span>
        </a>
        <a href="/wallet/" class="flex flex-col items-center justify-center text-[11px] {% if '/wallet' in request.path %}text-primary-600{% else %}text-gray-500{% endif %}">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"></path>
            </svg>
            <span>Wallet</span>
        </a>
        <a href="/payments/" class="flex flex-col items-center justify-center text-[11px] {% if '/payments' in request.path %}text-primary-600{% else %}text-gray-500{% endif %}">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>
            <span>Payment</span>
        </a>
        <a href="/withdrawals/" class="flex flex-col items-center justify-center text-[11px] {% if '/withdrawals' in request.path %}text-primary-600{% else %}text-gray-500{% endif %}">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2"></path>
            </svg>
            <span>Withdraw</span>
        </a>
        <a href="/referrals/" class="flex flex-col items-center justify-center text-[11px] {% if '/referrals' in request.path %}text-primary-600{% else %}text-gray-500{% endif %}">
            <svg class="w-5 h-5 mb-1" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M7 20H2v-2a3 3 0 015.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0"></path>
            </svg>
            <span>Team</span>
        </a>
    </div>
</nav>
{% endblock %}
