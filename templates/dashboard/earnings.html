{% extends 'dashboard/base.html' %}
{% block dashboard_content %}
<h1 class="text-2xl font-bold mb-4">Earnings</h1>
<div class="grid grid-cols-1 md:grid-cols-3 gap-4">
  <div class="bg-white rounded-xl shadow p-4"><p>Total</p><p class="font-semibold">{{ wallet.total_earnings }} PKR</p></div>
  <div class="bg-white rounded-xl shadow p-4"><p>Referral</p><p class="font-semibold">{{ wallet.referral_earnings }} PKR</p></div>
  <div class="bg-white rounded-xl shadow p-4"><p>Team</p><p class="font-semibold">{{ wallet.team_commissions }} PKR</p></div>
</div>
{% endblock %}
