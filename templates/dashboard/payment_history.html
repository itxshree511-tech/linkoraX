{% extends 'dashboard/base.html' %}
{% block dashboard_content %}
<h1 class="text-2xl font-bold mb-4">Payment History</h1>
<div class="bg-white rounded-xl shadow p-4">
  {% for p in payments %}
  <div class="py-3 border-b last:border-b-0 flex justify-between">
    <span>{{ p.payment_method }} - {{ p.status }}</span>
    <span>{{ p.amount }} PKR</span>
  </div>
  {% empty %}
  <p class="text-gray-500">No payment records yet.</p>
  {% endfor %}
</div>
{% endblock %}
