{% extends 'dashboard/base.html' %}
{% block dashboard_content %}
<h1 class="text-2xl font-bold mb-2">{{ ticket.subject }}</h1>
<p class="text-sm text-gray-500 mb-4">Ticket: {{ ticket.ticket_number }} | Status: {{ ticket.status }}</p>
<div class="bg-white rounded-xl shadow p-4 mb-4">
  {% for reply in replies %}
  <div class="py-3 border-b last:border-b-0">{{ reply.message }}</div>
  {% empty %}
  <p class="text-gray-500">No replies yet.</p>
  {% endfor %}
</div>
<form method="post" class="bg-white rounded-xl shadow p-4">
  {% csrf_token %}
  {{ form.as_p }}
  <button class="px-5 py-2 bg-primary-600 text-white rounded">Send Reply</button>
</form>
{% endblock %}
