{% extends 'base.html' %}

{% block title %}Forgot Password - LinkoraX{% endblock %}

{% block content %}
<section class="min-h-screen bg-gray-50 py-12">
    <div class="max-w-md mx-auto px-4 sm:px-6 lg:px-8">
        <div class="bg-white rounded-xl shadow-lg p-8">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-gray-900 mb-2">Reset Password</h1>
                <p class="text-gray-600">Enter your email to receive reset instructions</p>
            </div>
            
            <form method="post">
                {% csrf_token %}
                
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                        <input type="email" name="email" required class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent" placeholder="Enter your email">
                    </div>
                    
                    <button type="submit" class="w-full bg-primary-600 text-white py-3 rounded-lg font-semibold hover:bg-primary-700 transition">
                        Send Reset Link
                    </button>
                </div>
            </form>
            
            <div class="mt-6 text-center">
                <a href="/login/" class="text-primary-600 hover:underline">Back to Login</a>
            </div>
        </div>
    </div>
</section>
{% endblock %}
